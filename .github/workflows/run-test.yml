name: Test and Lint

on:
  pull_request:
    branches:
      - main
    types: [opened, reopened, edited, synchronize]
  # push:
  #  branches:
  #    - main

concurrency:
  group: mail-convert-forward-run-test
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run tests
        run: npm test
        
      - name: Run lint
        run: npm run lint
